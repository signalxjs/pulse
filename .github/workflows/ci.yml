name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite (sessions + ETag cache) needs Node 24.
        os: [ubuntu-latest]
        node-version: ['24']
        include:
          - os: windows-latest
            node-version: '24'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      # Every core dep must flow through a single-minor catalog (one hoisted
      # copy of @sigx/reactivity). Cheap static check; fails fast before build/test.
      - name: Verify catalog
        run: pnpm verify:catalog

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build
        run: pnpm build

      - name: Browser smoke (fixture mode)
        run: pnpm smoke

  smoke-cf:
    # The SAME assertion set as `smoke`, against the bundled worker under
    # real workerd (`wrangler dev --local` over dist-cf/, local D1) —
    # rfc-deploy §6's "serves identically" criterion. Ubuntu-only: the
    # deploy target is linux workerd; the node smoke covers cross-platform.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Build (cloudflare)
        run: pnpm build:cloudflare

      - name: Browser smoke over workerd (fixture mode)
        run: pnpm smoke:cf

  # verify-pack returns if/when packages/ start publishing (they are
  # workspace-private while they hatch).
