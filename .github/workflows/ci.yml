name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # node:sqlite (sessions + ETag cache) needs Node 24.
        os: [ubuntu-latest]
        node-version: ['24']
        include:
          - os: windows-latest
            node-version: '24'
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  # The Playwright smoke job (production build, fixture mode) arrives with
  # pulse#1 M1 step 4. verify-pack returns if/when packages/ start
  # publishing (they are workspace-private while they hatch).
