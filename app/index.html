<!doctype html>
<!--
  Anti-FOUC: Pulse is DARK-ONLY by design (pulse#39 — the handoff has a
  single dark palette, no theme switch), so the pre-paint theming problem
  daisyUI needed a blocking script for (pulse#14 / findings F11) reduces to
  one static inline background on <html>: the first paint is bg0 before any
  stylesheet or script arrives, no resolution logic required. Keep the
  value in sync with --color-bg0 in src/styles.css.
-->
<html lang="en" style="background: #0c0d11">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Pulse</title>
    </head>
    <body>
        <div id="app"><!--ssr-outlet--></div>
        <script type="module" src="/src/entry-client.tsx"></script>
    </body>
</html>
